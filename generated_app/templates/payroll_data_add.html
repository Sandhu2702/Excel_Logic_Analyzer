
<!DOCTYPE html>

<html>

<head>
<title>Add Payroll Data</title>
</head>

<body>

<h1>Add Payroll Data</h1>

<form method="POST">
<script>

function recalculate() {


            document.getElementsByName(
               "bonus_amount"
               )[0].value = (parseFloat(document.getElementsByName("salary")[0].value) || 0) * (parseFloat(document.getElementsByName("bonus_percent")[0].value) || 0) / 100;
            
            document.getElementsByName(
               "net_salary"
               )[0].value = (parseFloat(document.getElementsByName("salary")[0].value) || 0) + (parseFloat(document.getElementsByName("bonus_amount")[0].value) || 0) - (parseFloat(document.getElementsByName("tax")[0].value) || 0);
            

}

</script>

        <label>Employee ID</label>
        <br>

        <select name="employee_id">

        {% for item in employee_master_options %}

        <option value="{{ item['employee_id'] }}">
           {{ item['employee_id'] }}
        </option>

        {% endfor %}

        </select>

        <br><br>
        
           <label>Salary</label>
           <br>

           <input
           type="text"
           name="salary"
           
           oninput="recalculate()"
           >

           <br><br>
           
           <label>Performance Score</label>
           <br>

           <input
           type="text"
           name="performance_score"
           
           oninput="recalculate()"
           >

           <br><br>
           
           <label>Department</label>
           <br>

           <input
           type="text"
           name="department"
           
           oninput="recalculate()"
           >

           <br><br>
           
           <label>Bonus %</label>
           <br>

           <input
           type="text"
           name="bonus_percent"
           
           oninput="recalculate()"
           >

           <br><br>
           
           <label>Bonus Amount</label>
           <br>

           <input
           type="text"
           name="bonus_amount"
           readonly
           oninput="recalculate()"
           >

           <br><br>
           
           <label>Scholarship</label>
           <br>

           <input
           type="text"
           name="scholarship"
           
           oninput="recalculate()"
           >

           <br><br>
           
           <label>Tax</label>
           <br>

           <input
           type="text"
           name="tax"
           
           oninput="recalculate()"
           >

           <br><br>
           
           <label>Net Salary</label>
           <br>

           <input
           type="text"
           name="net_salary"
           readonly
           oninput="recalculate()"
           >

           <br><br>
           
           <label>Performance Grade</label>
           <br>

           <input
           type="text"
           name="performance_grade"
           
           oninput="recalculate()"
           >

           <br><br>
           
           <label>Promotion</label>
           <br>

           <input
           type="text"
           name="promotion"
           
           oninput="recalculate()"
           >

           <br><br>
           
           <label>Reward</label>
           <br>

           <input
           type="text"
           name="reward"
           
           oninput="recalculate()"
           >

           <br><br>
           
           <label>Experience Level</label>
           <br>

           <input
           type="text"
           name="experience_level"
           
           oninput="recalculate()"
           >

           <br><br>
           
<button type="submit">
Save
</button>

</form>

<br>

<a href="/">
Back Home
</a>

</body>
</html>
