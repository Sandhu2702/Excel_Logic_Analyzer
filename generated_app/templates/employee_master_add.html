
<!DOCTYPE html>

<html>

<head>
<title>Add Employee Master</title>
</head>

<body>

<h1>Add Employee Master</h1>

<form method="POST">

           <label>Employee ID</label>
           <br>

           <input
           type="text"
           name="employee_id"
           
           >

           <br><br>
           
           <label>Employee Name</label>
           <br>

           <input
           type="text"
           name="employee_name"
           
           >

           <br><br>
           
           <label>Department</label>
           <br>

           <input
           type="text"
           name="department"
           
           >

           <br><br>
           
           <label>Experience (Years)</label>
           <br>

           <input
           type="text"
           name="experience_years"
           
           >

           <br><br>
           
           <label>Salary</label>
           <br>

           <input
           type="text"
           name="salary"
           
           >

           <br><br>
           
           <label>Performance Rating</label>
           <br>

           <input
           type="text"
           name="performance_rating"
           
           >

           <br><br>
           
           <label>Attendance %</label>
           <br>

           <input
           type="text"
           name="attendance_percent"
           
           >

           <br><br>
           
           <label>Certification</label>
           <br>

           <input
           type="text"
           name="certification"
           
           >

           <br><br>
           
           <label>Location</label>
           <br>

           <input
           type="text"
           name="location"
           
           >

           <br><br>
           
<button type="submit">
Save
</button>

</form>

<br>

Back Home
</a>

</body>
</html>
