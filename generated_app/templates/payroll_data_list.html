
<!DOCTYPE html>

<html>

<head>
<title>Payroll Data</title>
</head>

<body>

<h1>Payroll Data</h1>
<form method="GET">

<input
type="text"
name="search"
placeholder="Search..."
value="{{ request.args.get('search', '') }}"
>

<button type="submit">
Search
</button>

</form>

<br><br>

<a href="/payroll_data/add">
Add Record
</a>

<br><br>

<table border="1">

<tr>
<th>ID</th>

{% for col in columns %}
<th>{{ col }}</th>
{% endfor %}

<th>Actions</th>

</tr>

{% for row in rows %}

<tr>

<td>{{ row["id"] }}</td>

{% for col in columns %}
<td>{{ row[col] }}</td>
{% endfor %}

<td>

<a href="/payroll_data/edit/{{ row['id'] }}">
Edit
</a>

<br><br>

<form
    method="POST"
    action="/payroll_data/delete/{{ row['id'] }}"
>

<button type="submit">
Delete
</button>

</form>

</td>


</tr>

{% endfor %}

</table>

<br><br>

<a href="/">
Back Home
</a>

</body>
</html>
